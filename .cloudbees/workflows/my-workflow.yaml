apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: My workflow
on:
  push:
    branches:
      - "**"
  workflow_dispatch:
jobs:
  build:
    # Override the default 60-minute timeout for this job
    # Max allowed: 4320 minutes (72 hours)
    timeout-minutes: 180  # 3 hours total for all steps
    steps:
      - name: Long running step - prints every minute
        uses: docker://golang:1.20.3-alpine3.17
        shell: sh
        timeout-minutes: 120  # This step can run up to 2 hours
        run: |
          for i in $(seq 1 65); do
            echo "Minute $i"
            sleep 60
          done
          echo "Completed 65 minutes"
