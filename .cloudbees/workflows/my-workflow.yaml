apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: My workflow
on:
  push:
    branches:
      - "**"
  workflow_dispatch:
jobs:
  build:
    # Override the default 60-minute timeout for this job
    # Max allowed: 4320 minutes (72 hours)
    timeout-minutes: 180  # 3 hours total for all steps
    steps:
      - name: Say hello
        uses: docker://golang:1.20.3-alpine3.17
        shell: sh
        run: |
          echo "hello world"
      
      - name: Long running step example
        uses: docker://golang:1.20.3-alpine3.17
        shell: sh
        # Optional: Set individual step timeout (must be <= job timeout)
        timeout-minutes: 120  # This specific step can run up to 2 hours
        run: |
          echo "Starting long-running operation..."
          # Simulate a long-running task (e.g., large build, data processing)
          sleep 90  # 90 seconds for demo; replace with your actual long task
          echo "Long-running operation completed!"
      
      - name: Final step
        uses: docker://golang:1.20.3-alpine3.17
        shell: sh
        run: |
          echo "Workflow completed successfully"
